<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Golden Section Palette</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,400..1000&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Google Sans Flex', -apple-system, sans-serif; }
body { background: #111; color: #ddd; display: flex; flex-direction: column; min-height: 100vh; }

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
  padding: 12px 22px; border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(17,17,17,0.97); position: sticky; top: 0; z-index: 100; gap: 10px;
}
.brand h1 { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; }
.brand span { font-size: 12px; color: #555; margin-left: 8px; }
.hdr-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

/* ── Buttons ── */
button {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.07); color: #bbb; font-size: 11.5px;
  font-family: inherit; font-weight: 600; cursor: pointer; white-space: nowrap;
  transition: background .13s, border-color .13s, color .13s;
}
button:hover { background: rgba(255,255,255,0.13); color: #fff; }
button.active { background: rgba(255,255,255,0.16); color: #fff; border-color: rgba(255,255,255,0.35); }
button.export-btn { background: rgba(80,160,255,0.12); border-color: rgba(80,160,255,0.3); color: #88bbff; }
button.export-btn:hover { background: rgba(80,160,255,0.2); }

.divider { width: 1px; height: 18px; background: rgba(255,255,255,0.1); }

/* ── Hue slider ── */
.hue-wrap { display: flex; align-items: center; gap: 7px; }
.hue-wrap label { font-size: 10.5px; color: #555; white-space: nowrap; }
#hueInput {
  -webkit-appearance: none; appearance: none; width: 110px; height: 5px;
  border-radius: 3px; outline: none; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
  background: linear-gradient(to right,
    oklch(0.65 0.18 0),oklch(0.65 0.18 30),oklch(0.65 0.18 60),oklch(0.65 0.18 90),
    oklch(0.65 0.18 120),oklch(0.65 0.18 150),oklch(0.65 0.18 180),oklch(0.65 0.18 210),
    oklch(0.65 0.18 240),oklch(0.65 0.18 270),oklch(0.65 0.18 300),oklch(0.65 0.18 330),
    oklch(0.65 0.18 360));
}
#hueInput::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: #fff; border: 2px solid #333; box-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
#hueVal { font-size: 10.5px; color: #555; min-width: 30px; }

/* ── Layout ── */
.app-body {
  flex: 1; display: grid; grid-template-columns: 280px 1fr;
  min-height: 0;
}

/* ── Left panel: wheel + modes ── */
.left-panel {
  border-right: 1px solid rgba(255,255,255,0.07);
  padding: 22px 18px; display: flex; flex-direction: column; gap: 20px;
  overflow-y: auto; background: rgba(255,255,255,0.015);
}

/* Color wheel */
.wheel-wrap {
  position: relative; width: 200px; height: 200px; margin: 0 auto;
  flex-shrink: 0;
}
#wheelCanvas { border-radius: 50%; display: block; cursor: crosshair; }
.wheel-center {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 44px; height: 44px; border-radius: 50%; border: 3px solid #222;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.12), 0 2px 8px rgba(0,0,0,0.6);
  pointer-events: none; transition: background .2s;
}
.wheel-marker {
  position: absolute; width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.5);
  transform: translate(-50%,-50%); pointer-events: none; transition: left .25s, top .25s;
}

/* Mode buttons */
.mode-section-label {
  font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #444;
}
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.mode-btn {
  padding: 8px 6px; font-size: 11px; border-radius: 8px; text-align: center;
  flex-direction: column; gap: 3px; height: auto; line-height: 1.3;
}
.mode-btn .mode-dots {
  display: flex; justify-content: center; gap: 3px; margin-bottom: 3px;
}
.mode-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.mode-btn.active { outline: 1.5px solid rgba(255,255,255,0.3); outline-offset: 1px; }

/* Mode info */
.mode-desc {
  font-size: 11px; color: #555; line-height: 1.55; padding: 10px 12px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
}

/* ── Right panel: palette ── */
.right-panel { padding: 22px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 22px; }

.section-label {
  font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #444;
  margin-bottom: 10px;
}

/* Groups of swatches per hue role */
.group-row { margin-bottom: 6px; }
.group-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
  color: #333; margin-bottom: 5px;
}
.group-strip { display: flex; gap: 0; border-radius: 8px; overflow: hidden; height: 72px; }
.group-strip .strip-sw {
  flex: 1; cursor: pointer; position: relative; transition: flex .3s cubic-bezier(.4,0,.2,1);
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px;
}
.group-strip .strip-sw:hover { flex: 2.2; }
.strip-sw .sw-hex {
  font-size: 9.5px; font-weight: 700; opacity: 0; transition: opacity .12s;
  mix-blend-mode: difference; color: #fff; pointer-events: none; white-space: nowrap;
}
.strip-sw:hover .sw-hex { opacity: 1; }
.strip-sw.copied::after {
  content: '✓'; position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 20px; color: #fff; background: rgba(0,0,0,0.3);
}

/* Big palette strip */
.palette-strip {
  display: flex; border-radius: 10px; overflow: hidden;
  box-shadow: 0 3px 18px rgba(0,0,0,0.5); height: 86px;
}
.palette-strip .strip-sw { flex: 1; }

/* Swatch cards */
.swatch-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;
}
.swatch-card {
  border-radius: 9px; overflow: hidden; cursor: pointer; position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: transform .13s, box-shadow .13s;
}
.swatch-card:hover { transform: translateY(-2px); box-shadow: 0 5px 16px rgba(0,0,0,0.5); }
.sw-color { height: 68px; }
.sw-info { background: rgba(255,255,255,0.04); border-top: 1px solid rgba(255,255,255,0.06); padding: 7px 9px; }
.sw-role  { font-size: 9px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 1px; }
.sw-hex2  { font-size: 11.5px; font-weight: 600; color: #ddd; font-family: monospace; }
.sw-lch   { font-size: 9.5px; color: #444; font-family: monospace; margin-top: 1px; }
.swatch-card.copied .sw-color::after {
  content: '✓'; position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 22px; color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.25);
}
.pin-btn {
  position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; border-radius: 50%;
  background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); font-size: 10px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  color: #aaa; opacity: 0; transition: opacity .12s; padding: 0; font-family: inherit;
}
.swatch-card:hover .pin-btn { opacity: 1; }
.swatch-card.pinned .pin-btn { opacity: 1; color: #fff; background: rgba(0,0,0,0.6); }
.swatch-card.pinned { outline: 1.5px solid rgba(255,255,255,0.35); outline-offset: -1px; }

/* CSS export */
#cssExport {
  background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 9px; padding: 14px; font-family: monospace; font-size: 11.5px;
  color: #6ec090; line-height: 1.75; white-space: pre-wrap; word-break: break-all;
  max-height: 240px; overflow-y: auto;
}

/* Toast */
#toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(50px);
  background: rgba(28,28,28,0.97); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; padding: 8px 16px; font-size: 12.5px; font-weight: 600;
  color: #fff; pointer-events: none; transition: transform .22s cubic-bezier(.4,0,.2,1), opacity .22s;
  opacity: 0; z-index: 999;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media (max-width: 700px) {
  .app-body { grid-template-columns: 1fr; }
  .left-panel { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.07); }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Golden Section Palette <span>φ · OKLCH</span></h1>
  </div>
  <div class="hdr-right">
    <div class="hue-wrap">
      <label for="hueInput">Base hue</label>
      <input type="range" id="hueInput" min="0" max="360" value="220">
      <span id="hueVal">220°</span>
    </div>
    <div class="divider"></div>
    <button onclick="randomize()">↗ Randomize</button>
    <button onclick="iterate()">⟳ +30°</button>
    <div class="divider"></div>
    <button class="export-btn" onclick="copyCSSVars()">⬡ Export CSS</button>
  </div>
</header>

<div class="app-body">

  <!-- ── Left: wheel + modes ── -->
  <div class="left-panel">
    <div class="wheel-wrap">
      <canvas id="wheelCanvas" width="200" height="200"></canvas>
      <div class="wheel-center" id="wheelCenter"></div>
      <!-- markers injected by JS -->
    </div>

    <div>
      <div class="mode-section-label" style="margin-bottom:10px;">Color theory mode</div>
      <div class="mode-grid" id="modeGrid"></div>
    </div>

    <div class="mode-desc" id="modeDesc"></div>
  </div>

  <!-- ── Right: palette output ── -->
  <div class="right-panel">

    <div>
      <div class="section-label">Full palette strip — hover to expand · click to copy</div>
      <div class="palette-strip" id="mainStrip"></div>
    </div>

    <div id="groupsArea">
      <div class="section-label">Hue groups</div>
      <div id="groups"></div>
    </div>

    <div>
      <div class="section-label">Swatches — click to copy · 📌 to lock</div>
      <div class="swatch-grid" id="swatchGrid"></div>
    </div>

    <div>
      <div class="section-label" style="margin-bottom:8px;">CSS custom properties</div>
      <pre id="cssExport"></pre>
      <button onclick="copyCSSVars()" style="margin-top:8px;">Copy CSS</button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const PHI          = (1 + Math.sqrt(5)) / 2;   // 1.618…
const GOLDEN_ANGLE = 360 / (PHI * PHI);         // 137.508°

// Lightness steps applied per hue (dark → light within each hue group)
const STEPS = [
  { role: 'Deep',      l: 0.15, cMul: 0.55 },
  { role: 'Shadow',    l: 0.25, cMul: 0.65 },
  { role: 'Dark',      l: 0.38, cMul: 0.80 },
  { role: 'Mid',       l: 0.52, cMul: 1.00 },
  { role: 'Vivid',     l: 0.62, cMul: 1.10 },
  { role: 'Bright',    l: 0.73, cMul: 0.90 },
  { role: 'Light',     l: 0.83, cMul: 0.65 },
  { role: 'Pale',      l: 0.92, cMul: 0.35 },
];

const BASE_CHROMA = 0.20; // starting chroma for the base hue

// ═══════════════════════════════════════════════════════════
// COLOR THEORY MODES
// ═══════════════════════════════════════════════════════════
const MODES = [
  {
    id: 'monochromatic',
    label: 'Monochromatic',
    dots: 1,
    desc: 'One hue across all lightness levels. Elegant, cohesive, and easy to pair with neutrals.',
    hues: h => [h],
  },
  {
    id: 'analogous',
    label: 'Analogous',
    dots: 3,
    desc: 'Three neighboring hues (±30°). Natural, harmonious — think sunsets or forest greens.',
    hues: h => [h, (h + 30) % 360, (h - 30 + 360) % 360],
  },
  {
    id: 'complementary',
    label: 'Complementary',
    dots: 2,
    desc: 'Base hue + its opposite (180° away). High contrast, vibrant tension — classic brand pairs.',
    hues: h => [h, (h + 180) % 360],
  },
  {
    id: 'split-comp',
    label: 'Split Comp.',
    dots: 3,
    desc: 'Base hue + two colors flanking its complement (±30° from 180°). More nuance than complementary.',
    hues: h => [h, (h + 150) % 360, (h + 210) % 360],
  },
  {
    id: 'triad',
    label: 'Triad',
    dots: 3,
    desc: 'Three hues equally spaced 120° apart. Vibrant and balanced — three equal voices.',
    hues: h => [h, (h + 120) % 360, (h + 240) % 360],
  },
  {
    id: 'tetrad',
    label: 'Tetrad',
    dots: 4,
    desc: 'Four hues at 90° intervals forming a rectangle on the wheel. Rich, complex, hard to balance.',
    hues: h => [h, (h + 90) % 360, (h + 180) % 360, (h + 270) % 360],
  },
  {
    id: 'key-color',
    label: 'Key Color',
    dots: 5,
    desc: 'Base hue dominates. Supporting hues are derived via golden-angle steps (φ²), creating mathematically-spaced accents.',
    hues: h => [h, (h + GOLDEN_ANGLE) % 360, (h + GOLDEN_ANGLE * 2) % 360, (h + GOLDEN_ANGLE * 3) % 360, (h + GOLDEN_ANGLE * 4) % 360],
  },
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let baseHue  = 220;
let modeId   = 'complementary';
let pinned   = {};   // flat index → true
let palette  = [];   // flat array of swatch objects
let groups   = [];   // [{label, hue, swatches:[]}]

// ═══════════════════════════════════════════════════════════
// OKLCH HELPERS — pure JS conversion (no browser computed style)
// ═══════════════════════════════════════════════════════════
function oklchCSS(l, c, h) {
  return `oklch(${l.toFixed(3)} ${c.toFixed(4)} ${h.toFixed(1)})`;
}

// OKLCH → OKLab → linear sRGB → sRGB → hex
function oklchToHex(L, C, H) {
  // 1. OKLCH → OKLab
  const hRad = H * Math.PI / 180;
  const a = C * Math.cos(hRad);
  const b = C * Math.sin(hRad);

  // 2. OKLab → linear sRGB via OKLab → LMS³ → LMS → sRGB
  const l_ = L + 0.3963377774 * a + 0.2158037573 * b;
  const m_ = L - 0.1055613458 * a - 0.0638541728 * b;
  const s_ = L - 0.0894841775 * a - 1.2914855480 * b;

  const l3 = l_ * l_ * l_;
  const m3 = m_ * m_ * m_;
  const s3 = s_ * s_ * s_;

  let r =  4.0767416621 * l3 - 3.3077115913 * m3 + 0.2309699292 * s3;
  let g = -1.2684380046 * l3 + 2.6097574011 * m3 - 0.3413193965 * s3;
  let bv = -0.0041960863 * l3 - 0.7034186147 * m3 + 1.7076147010 * s3;

  // 3. Linear sRGB → gamma sRGB
  function toGamma(x) {
    if (x <= 0) return 0;
    if (x >= 1) return 1;
    return x <= 0.0031308 ? 12.92 * x : 1.055 * Math.pow(x, 1/2.4) - 0.055;
  }
  r = toGamma(r); g = toGamma(g); bv = toGamma(bv);

  // 4. → hex
  return '#' + [r, g, bv].map(v =>
    Math.round(Math.max(0, Math.min(1, v)) * 255).toString(16).padStart(2, '0')
  ).join('');
}

// oklch hue (0-360) → cartesian position on a unit circle centered at cx,cy with radius r
function hueToXY(h, cx, cy, r) {
  const rad = ((h - 90) * Math.PI) / 180; // offset so 0° is at top
  return { x: cx + Math.cos(rad) * r, y: cy + Math.sin(rad) * r };
}

// ═══════════════════════════════════════════════════════════
// PALETTE BUILD
// ═══════════════════════════════════════════════════════════
function buildPalette() {
  const mode = MODES.find(m => m.id === modeId);
  const hues = mode.hues(baseHue);

  groups = hues.map((hue, gi) => {
    const chromaScale = gi === 0 ? 1.0 : 0.88; // slight chroma reduction on secondary hues
    const swatches = STEPS.map((step, si) => {
      const flatIdx = gi * STEPS.length + si;
      if (pinned[flatIdx]) return palette[flatIdx] || makeSwatch(hue, step, gi, si, flatIdx, chromaScale);
      return makeSwatch(hue, step, gi, si, flatIdx, chromaScale);
    });
    const hueLabel = hueNames(hue);
    return { label: hueLabel, hue, swatches };
  });

  palette = groups.flatMap(g => g.swatches);
}

function makeSwatch(hue, step, gi, si, flatIdx, chromaScale) {
  const l = step.l;
  const c = Math.min(0.37, BASE_CHROMA * step.cMul * chromaScale);
  const h = hue;
  const css = oklchCSS(l, c, h);
  const hex = oklchToHex(l, c, h);
  const groupLabel = gi === 0 ? 'Base' : `Hue ${gi + 1}`;
  return { l, c, h, css, hex, role: step.role, group: groupLabel, flatIdx };
}

function hueNames(h) {
  const names = [
    [0,'Red'],[15,'Red-Orange'],[30,'Orange'],[45,'Amber'],[60,'Yellow'],
    [75,'Yellow-Green'],[90,'Chartreuse'],[120,'Green'],[150,'Teal-Green'],
    [165,'Teal'],[180,'Cyan'],[195,'Sky'],[210,'Light Blue'],[240,'Blue'],
    [270,'Indigo'],[285,'Violet'],[300,'Purple'],[315,'Magenta'],
    [330,'Rose'],[345,'Crimson'],[360,'Red'],
  ];
  let best = names[0], bestDist = 999;
  for (const [nh, name] of names) {
    const d = Math.min(Math.abs(h - nh), 360 - Math.abs(h - nh));
    if (d < bestDist) { bestDist = d; best = [nh, name]; }
  }
  return best[1];
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  renderWheel();
  renderModes();
  renderStrip();
  renderGroups();
  renderSwatches();
  renderCSS();
}

// ── Color wheel canvas ──────────────────────────────────────
function renderWheel() {
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, cx = W / 2, cy = W / 2, R = W / 2 - 2;

  ctx.clearRect(0, 0, W, W);

  // Draw hue wheel with lightness gradient (OKLCH-ish via HSL approximation for canvas)
  for (let deg = 0; deg < 360; deg++) {
    const start = ((deg - 90) * Math.PI) / 180;
    const end   = ((deg - 89) * Math.PI) / 180;
    const grad = ctx.createRadialGradient(cx, cy, R * 0.28, cx, cy, R);
    grad.addColorStop(0, `hsl(${deg},0%,100%)`);
    grad.addColorStop(1, `hsl(${deg},90%,50%)`);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, start, end);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Dark overlay ring for depth
  const dGrad = ctx.createRadialGradient(cx, cy, R * 0.55, cx, cy, R);
  dGrad.addColorStop(0, 'rgba(0,0,0,0)');
  dGrad.addColorStop(1, 'rgba(0,0,0,0.18)');
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fillStyle = dGrad; ctx.fill();

  // Draw markers for each active hue
  const mode = MODES.find(m => m.id === modeId);
  const hues = mode.hues(baseHue);
  const markerRadius = R * 0.78;

  // Remove old markers
  document.querySelectorAll('.wheel-marker').forEach(e => e.remove());

  const wrap = document.querySelector('.wheel-wrap');
  hues.forEach((hue, gi) => {
    const pos = hueToXY(hue, cx, cy, markerRadius);
    const el = document.createElement('div');
    el.className = 'wheel-marker';
    el.style.left = pos.x + 'px';
    el.style.top  = pos.y + 'px';
    el.style.background = oklchCSS(0.62, 0.22, hue);
    el.style.zIndex = gi === 0 ? 5 : 4;
    el.style.width  = gi === 0 ? '14px' : '11px';
    el.style.height = gi === 0 ? '14px' : '11px';
    wrap.appendChild(el);
  });

  // Draw spoke lines from center to markers
  hues.forEach((hue, gi) => {
    const pos = hueToXY(hue, cx, cy, markerRadius * 0.88);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = gi === 0 ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.28)';
    ctx.lineWidth = gi === 0 ? 1.5 : 1;
    ctx.stroke();
  });

  // Update center swatch
  document.getElementById('wheelCenter').style.background = oklchCSS(0.62, 0.22, baseHue);
}

// ── Mode buttons ────────────────────────────────────────────
function renderModes() {
  const grid = document.getElementById('modeGrid');
  grid.innerHTML = '';
  const mode = MODES.find(m => m.id === modeId);
  const hues = mode.hues(baseHue);

  MODES.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mode-btn' + (m.id === modeId ? ' active' : '');

    // Mini dots preview
    const dotsEl = document.createElement('div');
    dotsEl.className = 'mode-dots';
    const previewHues = m.hues(baseHue);
    previewHues.forEach(h => {
      const dot = document.createElement('span');
      dot.className = 'mode-dot';
      dot.style.background = oklchCSS(0.65, 0.20, h);
      dotsEl.appendChild(dot);
    });
    btn.appendChild(dotsEl);
    btn.appendChild(document.createTextNode(m.label));
    btn.addEventListener('click', () => { modeId = m.id; buildPalette(); render(); });
    grid.appendChild(btn);
  });

  document.getElementById('modeDesc').textContent = mode.desc;
}

// ── Main strip ──────────────────────────────────────────────
function renderStrip() {
  const strip = document.getElementById('mainStrip');
  strip.innerHTML = '';
  palette.forEach((sw, i) => {
    const div = document.createElement('div');
    div.className = 'strip-sw';
    div.style.background = sw.css;
    const hexEl = document.createElement('span');
    hexEl.className = 'sw-hex';
    hexEl.textContent = sw.hex;
    div.appendChild(hexEl);
    div.addEventListener('click', () => copyAndFlash(sw.hex, div));
    strip.appendChild(div);
  });
}

// ── Grouped strips ──────────────────────────────────────────
function renderGroups() {
  const container = document.getElementById('groups');
  container.innerHTML = '';
  const label = document.querySelector('#groupsArea .section-label');
  label.textContent = groups.length > 1 ? 'Hue groups' : 'Lightness ramp';

  groups.forEach((g, gi) => {
    const row = document.createElement('div');
    row.className = 'group-row';
    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.textContent = gi === 0 ? `Base — ${g.label} (${Math.round(g.hue)}°)` : `${g.label} (${Math.round(g.hue)}°)`;
    const strip = document.createElement('div');
    strip.className = 'group-strip';
    g.swatches.forEach(sw => {
      const div = document.createElement('div');
      div.className = 'strip-sw';
      div.style.background = sw.css;
      const hexEl = document.createElement('span');
      hexEl.className = 'sw-hex';
      hexEl.textContent = sw.hex;
      div.appendChild(hexEl);
      div.addEventListener('click', () => copyAndFlash(sw.hex, div));
      strip.appendChild(div);
    });
    row.appendChild(lbl);
    row.appendChild(strip);
    container.appendChild(row);
  });
}

// ── Swatch cards ────────────────────────────────────────────
function renderSwatches() {
  const grid = document.getElementById('swatchGrid');
  grid.innerHTML = '';
  palette.forEach((sw, i) => {
    const card = document.createElement('div');
    card.className = 'swatch-card' + (pinned[i] ? ' pinned' : '');

    const colorDiv = document.createElement('div');
    colorDiv.className = 'sw-color';
    colorDiv.style.background = sw.css;

    const info = document.createElement('div');
    info.className = 'sw-info';
    info.innerHTML = `<div class="sw-role">${sw.group} · ${sw.role}</div><div class="sw-hex2">${sw.hex}</div><div class="sw-lch">oklch(${sw.l.toFixed(2)} ${sw.c.toFixed(3)} ${sw.h.toFixed(0)}°)</div>`;

    const pinBtn = document.createElement('button');
    pinBtn.className = 'pin-btn';
    pinBtn.title = pinned[i] ? 'Unpin' : 'Pin color';
    pinBtn.textContent = pinned[i] ? '📌' : '○';
    pinBtn.addEventListener('click', e => { e.stopPropagation(); pinned[i] = !pinned[i]; renderSwatches(); });

    card.appendChild(colorDiv);
    card.appendChild(info);
    card.appendChild(pinBtn);
    card.addEventListener('click', () => copyAndFlash(sw.hex, card));
    grid.appendChild(card);
  });
}

// ── CSS export ──────────────────────────────────────────────
function renderCSS() {
  const lines = [':root {'];
  groups.forEach((g, gi) => {
    const prefix = gi === 0 ? '' : `-h${gi + 1}`;
    g.swatches.forEach(sw => {
      const slug = sw.role.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      lines.push(`  --color${prefix}-${slug}: ${sw.css};`);
      lines.push(`  --color${prefix}-${slug}-hex: ${sw.hex};`);
    });
    if (gi < groups.length - 1) lines.push('');
  });
  lines.push('}');
  document.getElementById('cssExport').textContent = lines.join('\n');
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function randomize() {
  baseHue = Math.random() * 360;
  syncSlider();
  buildPalette();
  render();
}

function iterate() {
  baseHue = (baseHue + 30) % 360;
  syncSlider();
  buildPalette();
  render();
}

function syncSlider() {
  document.getElementById('hueInput').value = Math.round(baseHue);
  document.getElementById('hueVal').textContent = Math.round(baseHue) + '°';
}

document.getElementById('hueInput').addEventListener('input', e => {
  baseHue = +e.target.value;
  document.getElementById('hueVal').textContent = Math.round(baseHue) + '°';
  buildPalette();
  render();
});

// Wheel click → set base hue
document.getElementById('wheelCanvas').addEventListener('click', e => {
  const canvas = e.currentTarget;
  const rect = canvas.getBoundingClientRect();
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const dx = e.clientX - rect.left - cx;
  const dy = e.clientY - rect.top  - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 22 || dist > cx - 2) return; // ignore center & outer rim
  let angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
  if (angle < 0) angle += 360;
  baseHue = angle % 360;
  syncSlider();
  buildPalette();
  render();
});

async function copyCSSVars() {
  await copyText(document.getElementById('cssExport').textContent);
  showToast('CSS vars copied!');
}

async function copyAndFlash(text, el) {
  await copyText(text);
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 800);
  showToast('Copied ' + text);
}

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); } catch (_) {
    const ta = Object.assign(document.createElement('textarea'), { value: text });
    Object.assign(ta.style, { position:'fixed', opacity:'0' });
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
buildPalette();
render();
</script>
