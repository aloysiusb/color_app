<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Color Theory Wheel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,400..1000&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Google Sans Flex', -apple-system, sans-serif; background: #111; color: #ddd; }

/* ── Header ── */
header {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 11px 22px; border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(17,17,17,0.97); position: sticky; top: 0; z-index: 50;
}
header h1 { font-size: 14px; font-weight: 700; color: #fff; }
header .sub { font-size: 11.5px; color: #444; }
.back-link { font-size: 11px; color: #555; text-decoration: none; margin-right: 4px; }
.back-link:hover { color: #aaa; }

/* ── Page content — single centered column ── */
.page { max-width: 860px; margin: 0 auto; padding: 32px 24px 60px; display: flex; flex-direction: column; align-items: center; gap: 30px; }

/* ── Picker ── */
.picker-row {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; padding: 14px 20px; width: 100%;
}
.picker-row label { font-size: 11px; color: #555; }
#colorPicker {
  width: 46px; height: 36px; border: 2px solid rgba(255,255,255,0.15);
  border-radius: 8px; cursor: pointer; background: none; padding: 0; outline: none;
}
#hexInput {
  font-family: monospace; font-size: 13px; font-weight: 600; color: #fff;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 7px; padding: 7px 11px; width: 96px; outline: none;
}
#hexInput:focus { border-color: rgba(255,255,255,0.3); }
.hsl-display { font-size: 11px; color: #444; font-family: monospace; }

/* ── Color wheel ── */
.wheel-wrap { position: relative; flex-shrink: 0; }
#wheelCanvas { display: block; border-radius: 50%; cursor: crosshair; }
.hw-marker {
  position: absolute; border-radius: 50%; transform: translate(-50%, -50%);
  border: 2.5px solid #fff; box-shadow: 0 0 0 1.5px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.6);
  pointer-events: none; transition: left .3s cubic-bezier(.4,0,.2,1), top .3s cubic-bezier(.4,0,.2,1);
}
.hw-label {
  position: absolute; transform: translate(-50%, -50%);
  font-size: 10px; font-weight: 800; color: #fff; pointer-events: none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.95); white-space: nowrap; letter-spacing: -.01em;
}

/* ── Mode buttons ── */
.mode-strip { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; width: 100%; }
.mode-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05); color: #999; font-size: 12px;
  font-family: inherit; font-weight: 600; cursor: pointer; white-space: nowrap;
  transition: background .13s, color .13s, border-color .13s;
}
.mode-btn:hover { background: rgba(255,255,255,0.10); color: #ddd; }
.mode-btn.active { color: #fff; border-color: rgba(255,255,255,0.38); background: rgba(255,255,255,0.12); }
.mode-dots { display: flex; gap: 3px; }
.mdot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; border: 1.5px solid rgba(0,0,0,0.3); }

/* ── Mode info ── */
.mode-info {
  text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%;
}
.mode-info h2 { font-size: 17px; font-weight: 700; color: #fff; }
.mode-info p  { font-size: 13px; color: #666; line-height: 1.6; max-width: 520px; }
.mode-formula {
  font-size: 12px; font-family: monospace; color: #3aaa80;
  background: rgba(40,120,80,0.09); border: 1px solid rgba(40,120,80,0.2);
  border-radius: 8px; padding: 9px 18px; white-space: pre; display: inline-block;
}

/* ── Divider ── */
.divider { width: 100%; height: 1px; background: rgba(255,255,255,0.06); }

/* ── Section labels ── */
.section-label {
  font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
  color: #3a3a3a; margin-bottom: 12px; width: 100%;
}

/* ── Harmony groups ── */
.harmony-groups { display: flex; flex-direction: column; gap: 20px; width: 100%; }

.hgroup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.hgroup-dot {
  width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.hgroup-title { font-size: 13px; font-weight: 700; color: #bbb; }
.hgroup-angle  { font-size: 10.5px; color: #444; font-family: monospace; margin-left: 2px; }

/* Tint/shade strip */
.tint-strip {
  display: flex; border-radius: 10px; overflow: hidden; height: 70px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.45);
}
.tint-swatch {
  flex: 1; cursor: pointer; position: relative;
  transition: flex .3s cubic-bezier(.4,0,.2,1);
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px;
}
.tint-swatch:hover { flex: 2.8; }
.ts-label {
  font-size: 9.5px; font-weight: 700; opacity: 0; transition: opacity .12s;
  pointer-events: none; color: #fff; mix-blend-mode: difference; white-space: nowrap;
}
.tint-swatch:hover .ts-label { opacity: 1; }
.tint-swatch.copied::after {
  content: '✓'; position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 18px; color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.25);
}

/* ── CSS block ── */
#cssOut {
  background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; padding: 16px; font-family: monospace; font-size: 11.5px;
  color: #5aaa80; line-height: 1.85; white-space: pre-wrap;
  max-height: 320px; overflow-y: auto; width: 100%;
}
.copy-btn {
  margin-top: 10px; display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.06); color: #aaa; font-size: 12px;
  font-family: inherit; font-weight: 600; cursor: pointer;
}
.copy-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(50px);
  background: rgba(28,28,28,0.97); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; padding: 8px 16px; font-size: 12.5px; font-weight: 600;
  color: #fff; pointer-events: none; opacity: 0; z-index: 999;
  transition: transform .22s cubic-bezier(.4,0,.2,1), opacity .22s;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <a class="back-link" href="palette.html">← Palette</a>
  <h1>Color Theory Wheel</h1>
  <span class="sub">Pure HSL · no phi · no OKLCH</span>
</header>

<div class="page">

  <!-- Picker -->
  <div class="picker-row">
    <label>Base color</label>
    <input type="color" id="colorPicker" value="#0077bb">
    <input type="text"  id="hexInput"    value="#0077bb" spellcheck="false" maxlength="7">
    <span class="hsl-display" id="hslDisplay">hsl(204, 100%, 37%)</span>
    <span style="font-size:11px;color:#333;">· or click the wheel</span>
  </div>

  <!-- Wheel -->
  <div class="wheel-wrap" id="wheelWrap">
    <canvas id="wheelCanvas" width="440" height="440"></canvas>
  </div>

  <!-- Mode buttons -->
  <div class="mode-strip" id="modeStrip"></div>

  <!-- Mode description -->
  <div class="mode-info">
    <h2 id="modeTitle"></h2>
    <p  id="modeDesc"></p>
    <pre class="mode-formula" id="modeFormula"></pre>
  </div>

  <div class="divider"></div>

  <!-- Harmony strips -->
  <div style="width:100%;">
    <div class="section-label">Harmony colors — hover to expand · click to copy hex</div>
    <div class="harmony-groups" id="harmonyGroups"></div>
  </div>

  <div class="divider"></div>

  <!-- CSS vars -->
  <div style="width:100%;">
    <div class="section-label">CSS variables</div>
    <pre id="cssOut"></pre>
    <button class="copy-btn" onclick="copyCSSOut()">Copy CSS</button>
  </div>

</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// PURE HSL COLOR THEORY
// ═══════════════════════════════════════════════════════════

const SHADES = [
  ['900', 10], ['800', 18], ['700', 28], ['600', 38],
  ['500', 50], ['400', 62], ['300', 72], ['200', 82], ['100', 91],
];
const SAT = 85;

const MODES = [
  {
    id: 'monochromatic',
    label: 'Monochromatic',
    desc: 'One hue, many lightness and saturation values. Unified, calm — an easy foundation to work from.',
    formula: 'H  (L & S vary only)',
    offsets: () => [0],
    arcSpan: 22,
  },
  {
    id: 'analogous',
    label: 'Analogous',
    desc: 'Three neighboring hues (±30°). Found in nature — think sunsets, ocean gradients, forest canopies.',
    formula: 'H − 30°,  H,  H + 30°',
    offsets: () => [-30, 0, 30],
    arcSpan: 18,
  },
  {
    id: 'complementary',
    label: 'Complementary',
    desc: 'Base hue and its exact opposite (180°). Maximum contrast — vibrant, bold, impossible to ignore.',
    formula: 'H,  H + 180°',
    offsets: () => [0, 180],
    arcSpan: 22,
  },
  {
    id: 'split-comp',
    label: 'Split Comp.',
    desc: 'Base + the two hues flanking its complement (±30° from 180°). More nuance than complementary, still punchy.',
    formula: 'H,  H + 150°,  H + 210°',
    offsets: () => [0, 150, 210],
    arcSpan: 18,
  },
  {
    id: 'triad',
    label: 'Triad',
    desc: 'Three hues equally spaced at 120°. Vibrant and balanced — like a triangle spinning on the wheel.',
    formula: 'H,  H + 120°,  H + 240°',
    offsets: () => [0, 120, 240],
    arcSpan: 20,
  },
  {
    id: 'tetrad',
    label: 'Tetrad',
    desc: 'Four hues at 90° intervals forming a rectangle on the wheel. Rich and complex — let one hue dominate.',
    formula: 'H,  H + 90°,  H + 180°,  H + 270°',
    offsets: () => [0, 90, 180, 270],
    arcSpan: 16,
  },
];

let baseH = 204, baseS = 100, baseL = 37;
let modeId = 'complementary';

// ── HSL helpers ──────────────────────────────────────────────
function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360; s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(-1, Math.min(k-3, 9-k, 1)); };
  return '#' + [f(0),f(8),f(4)].map(v => Math.round(v*255).toString(16).padStart(2,'0')).join('');
}

function hexToHsl(hex) {
  let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h, s, l=(max+min)/2;
  if(max===min){h=s=0;}
  else{
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hueToXY(hue, cx, cy, r) {
  const rad = ((hue - 90) * Math.PI) / 180;
  return { x: cx + Math.cos(rad)*r, y: cy + Math.sin(rad)*r };
}

function getHarmonyHues() {
  const mode = MODES.find(m => m.id === modeId);
  return mode.offsets().map(off => ((baseH + off) % 360 + 360) % 360);
}

// ── Draw wheel ───────────────────────────────────────────────
function drawWheel() {
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, cx = W/2, cy = W/2;
  const outerR = W/2 - 3;
  const innerR = outerR * 0.28;

  ctx.clearRect(0,0,W,W);

  // Full hue wheel
  for (let deg = 0; deg < 360; deg++) {
    const a0 = ((deg - 90) * Math.PI) / 180;
    const a1 = ((deg + 1 - 90) * Math.PI) / 180;
    const grad = ctx.createRadialGradient(cx,cy,innerR, cx,cy,outerR);
    grad.addColorStop(0,   `hsl(${deg}, 0%, 100%)`);
    grad.addColorStop(0.45,`hsl(${deg}, 100%, 50%)`);
    grad.addColorStop(1,   `hsl(${deg}, 80%, 25%)`);
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,outerR,a0,a1);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Center hole
  ctx.beginPath();
  ctx.arc(cx,cy,innerR,0,Math.PI*2);
  ctx.fillStyle = '#161616';
  ctx.fill();

  // Harmony highlights
  const mode = MODES.find(m => m.id === modeId);
  const hues = getHarmonyHues();
  const span = mode.arcSpan / 2;
  const highlightOuter = outerR;
  const highlightInner = outerR - 26;

  hues.forEach((hue, i) => {
    const a0 = ((hue - span - 90) * Math.PI) / 180;
    const a1 = ((hue + span - 90) * Math.PI) / 180;

    // Glow halo
    const gGrad = ctx.createRadialGradient(cx,cy,highlightInner-12, cx,cy,highlightOuter+10);
    gGrad.addColorStop(0,   `hsla(${hue},100%,65%,0)`);
    gGrad.addColorStop(0.5, `hsla(${hue},100%,65%,0.45)`);
    gGrad.addColorStop(1,   `hsla(${hue},100%,65%,0)`);
    ctx.beginPath();
    ctx.arc(cx,cy,highlightOuter+8,a0,a1);
    ctx.arc(cx,cy,highlightInner-10,a1,a0,true);
    ctx.closePath();
    ctx.fillStyle = gGrad;
    ctx.fill();

    // Solid arc band
    ctx.beginPath();
    ctx.arc(cx,cy,highlightOuter,a0,a1);
    ctx.arc(cx,cy,highlightInner,a1,a0,true);
    ctx.closePath();
    ctx.fillStyle = `hsla(${hue},100%,62%,0.85)`;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });

  // Spokes
  hues.forEach((hue, i) => {
    const pos = hueToXY(hue, cx, cy, highlightInner - 18);
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = i===0 ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.22)';
    ctx.lineWidth = i===0 ? 1.5 : 1;
    ctx.setLineDash(i===0 ? [] : [5,5]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Connecting polygon
  if (hues.length > 1) {
    const pr = highlightInner - 18;
    ctx.beginPath();
    hues.forEach((hue, i) => {
      const p = hueToXY(hue, cx, cy, pr);
      i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y);
    });
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Center base color circle
  ctx.beginPath();
  ctx.arc(cx,cy,innerR-4,0,Math.PI*2);
  ctx.fillStyle = `hsl(${baseH},${baseS}%,${baseL}%)`;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.28)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // DOM markers
  updateMarkers(hues, cx, cy, highlightInner - 16);
}

function updateMarkers(hues, cx, cy, r) {
  document.querySelectorAll('.hw-marker,.hw-label').forEach(e => e.remove());
  const wrap = document.getElementById('wheelWrap');

  hues.forEach((hue, i) => {
    const pos = hueToXY(hue, cx, cy, r);
    const dot = document.createElement('div');
    dot.className = 'hw-marker';
    dot.style.cssText = `left:${pos.x}px;top:${pos.y}px;width:${i===0?18:13}px;height:${i===0?18:13}px;background:hsl(${hue},100%,55%);z-index:${i===0?5:4};`;
    wrap.appendChild(dot);

    // Label slightly further out
    const lp = hueToXY(hue, cx, cy, r + 30);
    const lbl = document.createElement('div');
    lbl.className = 'hw-label';
    lbl.style.cssText = `left:${lp.x}px;top:${lp.y}px;font-size:${i===0?11:10}px;`;
    const off = Math.round(((hue - hues[0]) + 360) % 360);
    lbl.textContent = i===0 ? `${Math.round(hue)}°` : `+${off}°`;
    wrap.appendChild(lbl);
  });
}

// ── Mode buttons ─────────────────────────────────────────────
function renderModes() {
  const strip = document.getElementById('modeStrip');
  strip.innerHTML = '';
  MODES.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mode-btn' + (m.id===modeId ? ' active' : '');
    const dotsEl = document.createElement('div');
    dotsEl.className = 'mode-dots';
    m.offsets().forEach(off => {
      const h = ((baseH+off)%360+360)%360;
      const d = document.createElement('span');
      d.className = 'mdot';
      d.style.background = `hsl(${h},${SAT}%,50%)`;
      dotsEl.appendChild(d);
    });
    btn.appendChild(dotsEl);
    btn.appendChild(document.createTextNode(m.label));
    btn.addEventListener('click', () => { modeId=m.id; rebuildAll(); });
    strip.appendChild(btn);
  });
  const mode = MODES.find(m => m.id===modeId);
  document.getElementById('modeTitle').textContent   = mode.label;
  document.getElementById('modeDesc').textContent    = mode.desc;
  document.getElementById('modeFormula').textContent = mode.formula;
}

// ── Harmony palette ──────────────────────────────────────────
function renderPalette() {
  const hues = getHarmonyHues();
  const container = document.getElementById('harmonyGroups');
  container.innerHTML = '';
  const cssLines = [':root {'];
  const roleNames = ['base','h2','h3','h4'];

  hues.forEach((hue, gi) => {
    const group = document.createElement('div');
    group.className = 'hgroup';

    // Header
    const header = document.createElement('div');
    header.className = 'hgroup-header';
    const dot = document.createElement('div');
    dot.className = 'hgroup-dot';
    dot.style.background = `hsl(${hue},${SAT}%,50%)`;
    const title = document.createElement('span');
    title.className = 'hgroup-title';
    title.textContent = gi===0
      ? `Base — ${hueName(hue)} (${Math.round(hue)}°)`
      : `${hueName(hue)} (${Math.round(hue)}°)`;
    const angleEl = document.createElement('span');
    angleEl.className = 'hgroup-angle';
    const off = Math.round(((hue - hues[0]) + 360) % 360);
    angleEl.textContent = gi===0 ? '' : `+${off}° from base`;
    header.appendChild(dot); header.appendChild(title); header.appendChild(angleEl);

    // Tint strip
    const strip = document.createElement('div');
    strip.className = 'tint-strip';
    SHADES.forEach(([name, l]) => {
      const hex = hslToHex(hue, SAT, l);
      const sw = document.createElement('div');
      sw.className = 'tint-swatch';
      sw.style.background = hex;
      const lbl = document.createElement('span');
      lbl.className = 'ts-label';
      lbl.textContent = hex;
      sw.appendChild(lbl);
      sw.addEventListener('click', () => copyAndFlash(hex, sw));
      strip.appendChild(sw);
      const varName = `--color-${roleNames[gi]||'h'+gi}-${name}`;
      cssLines.push(`  ${varName}: ${hex};  /* hsl(${Math.round(hue)}, ${SAT}%, ${l}%) */`);
    });
    if (gi < hues.length-1) cssLines.push('');

    group.appendChild(header);
    group.appendChild(strip);
    container.appendChild(group);
  });

  cssLines.push('}');
  document.getElementById('cssOut').textContent = cssLines.join('\n');
}

function hueName(h) {
  const n = [[0,'Red'],[15,'Red-Orange'],[30,'Orange'],[45,'Amber'],[60,'Yellow'],[80,'Yellow-Green'],[120,'Green'],[150,'Emerald'],[165,'Teal'],[180,'Cyan'],[210,'Sky Blue'],[240,'Blue'],[270,'Indigo'],[285,'Violet'],[300,'Purple'],[315,'Magenta'],[330,'Rose'],[345,'Crimson']];
  let best=n[0], d=999;
  n.forEach(([nh,nm])=>{const dd=Math.min(Math.abs(h-nh),360-Math.abs(h-nh));if(dd<d){d=dd;best=[nh,nm];}});
  return best[1];
}

function rebuildAll() { renderModes(); drawWheel(); renderPalette(); }

// ── Picker wiring ────────────────────────────────────────────
function applyHex(hex) {
  if (!/^#[0-9a-f]{6}$/i.test(hex)) return;
  [baseH, baseS, baseL] = hexToHsl(hex);
  document.getElementById('colorPicker').value = hex;
  document.getElementById('hexInput').value = hex;
  document.getElementById('hslDisplay').textContent = `hsl(${baseH}, ${baseS}%, ${baseL}%)`;
  rebuildAll();
}

document.getElementById('colorPicker').addEventListener('input', e => applyHex(e.target.value));
document.getElementById('hexInput').addEventListener('input', e => {
  if (/^#[0-9a-f]{6}$/i.test(e.target.value.trim())) applyHex(e.target.value.trim());
});
document.getElementById('hexInput').addEventListener('keydown', e => {
  if (e.key==='Enter') applyHex(document.getElementById('hexInput').value.trim());
});

document.getElementById('wheelCanvas').addEventListener('click', e => {
  const canvas = e.currentTarget;
  const rect = canvas.getBoundingClientRect();
  const cx = canvas.width/2, cy = canvas.height/2;
  const sx = canvas.width  / rect.width;
  const sy = canvas.height / rect.height;
  const dx = (e.clientX - rect.left)*sx - cx;
  const dy = (e.clientY - rect.top )*sy - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < cx*0.28 || dist > cx-3) return;
  let angle = Math.atan2(dy,dx)*180/Math.PI + 90;
  if (angle < 0) angle += 360;
  baseH = Math.round(angle) % 360;
  const hex = hslToHex(baseH, baseS, baseL);
  document.getElementById('colorPicker').value = hex;
  document.getElementById('hexInput').value = hex;
  document.getElementById('hslDisplay').textContent = `hsl(${baseH}, ${baseS}%, ${baseL}%)`;
  rebuildAll();
});

// ── Copy ─────────────────────────────────────────────────────
async function copyAndFlash(text, el) {
  await copyText(text);
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 800);
  toast('Copied ' + text);
}
async function copyCSSOut() {
  await copyText(document.getElementById('cssOut').textContent);
  toast('CSS copied!');
}
async function copyText(t) {
  try { await navigator.clipboard.writeText(t); }
  catch (_) {
    const ta = Object.assign(document.createElement('textarea'),{value:t});
    Object.assign(ta.style,{position:'fixed',opacity:'0'});
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  }
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Init ─────────────────────────────────────────────────────
applyHex('#0077bb');
